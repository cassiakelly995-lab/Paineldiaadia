<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Painel de Links</title>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@500;700&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0e0f14;
      --surface: #16181f;
      --card: #1d2030;
      --border: rgba(255,255,255,0.07);
      --accent: #c8a96e;
      --accent2: #7c8ff5;
      --text: #e8e6df;
      --muted: #7a7a8a;
      --success: #6fcf97;
    }

    body {
      font-family: 'DM Sans', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 2rem 1rem;
      overflow-x: hidden;
    }

    /* Background decoration */
    body::before {
      content: '';
      position: fixed;
      top: -200px; left: -200px;
      width: 600px; height: 600px;
      background: radial-gradient(circle, rgba(124,143,245,0.08) 0%, transparent 70%);
      pointer-events: none;
    }
    body::after {
      content: '';
      position: fixed;
      bottom: -200px; right: -200px;
      width: 600px; height: 600px;
      background: radial-gradient(circle, rgba(200,169,110,0.07) 0%, transparent 70%);
      pointer-events: none;
    }

    .container {
      width: 100%;
      max-width: 760px;
      animation: fadeUp 0.7s ease both;
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(28px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .header {
      text-align: center;
      margin-bottom: 2.8rem;
    }

    .header-label {
      font-size: 0.72rem;
      letter-spacing: 0.22em;
      text-transform: uppercase;
      color: var(--accent);
      margin-bottom: 0.6rem;
    }

    .header h1 {
      font-family: 'Playfair Display', serif;
      font-size: clamp(1.8rem, 5vw, 2.6rem);
      font-weight: 700;
      color: var(--text);
      letter-spacing: -0.01em;
      line-height: 1.2;
    }

    .header h1 span {
      color: var(--accent);
    }

    .header p {
      margin-top: 0.7rem;
      color: var(--muted);
      font-size: 0.9rem;
      font-weight: 300;
    }

    .divider {
      width: 48px;
      height: 2px;
      background: linear-gradient(to right, var(--accent), transparent);
      margin: 1rem auto 0;
    }

    .grid {
      display: grid;
      grid-template-columns: 1fr;
      gap: 1rem;
    }

    .card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 1.4rem 1.6rem;
      display: flex;
      align-items: center;
      gap: 1.2rem;
      transition: border-color 0.25s, transform 0.2s, box-shadow 0.25s;
      animation: fadeUp 0.6s ease both;
      position: relative;
      overflow: hidden;
    }

    .card:nth-child(1) { animation-delay: 0.1s; }
    .card:nth-child(2) { animation-delay: 0.2s; }
    .card:nth-child(3) { animation-delay: 0.3s; }
    .card:nth-child(4) { animation-delay: 0.4s; }

    .card::before {
      content: '';
      position: absolute;
      left: 0; top: 0; bottom: 0;
      width: 3px;
      border-radius: 16px 0 0 16px;
      background: var(--card-accent, var(--accent));
      transition: opacity 0.2s;
      opacity: 0.6;
    }

    .card:hover {
      border-color: rgba(255,255,255,0.14);
      transform: translateY(-2px);
      box-shadow: 0 12px 40px rgba(0,0,0,0.35);
    }
    .card:hover::before { opacity: 1; }

    .card:nth-child(1) { --card-accent: #c8a96e; }
    .card:nth-child(2) { --card-accent: #7c8ff5; }
    .card:nth-child(3) { --card-accent: #f5a67c; }
    .card:nth-child(4) { --card-accent: #7cf5c8; }

    .icon-box {
      width: 48px; height: 48px;
      border-radius: 12px;
      display: flex; align-items: center; justify-content: center;
      font-size: 1.4rem;
      flex-shrink: 0;
      background: rgba(255,255,255,0.05);
      border: 1px solid rgba(255,255,255,0.07);
    }

    .card-info {
      flex: 1;
      min-width: 0;
    }

    .card-title {
      font-family: 'Playfair Display', serif;
      font-size: 1rem;
      font-weight: 500;
      color: var(--text);
      margin-bottom: 0.25rem;
    }

    .card-url {
      font-size: 0.76rem;
      color: var(--muted);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      max-width: 100%;
    }

    .actions {
      display: flex;
      gap: 0.5rem;
      flex-shrink: 0;
    }

    .btn {
      display: flex;
      align-items: center;
      gap: 0.4rem;
      padding: 0.5rem 0.9rem;
      border-radius: 9px;
      font-family: 'DM Sans', sans-serif;
      font-size: 0.78rem;
      font-weight: 500;
      cursor: pointer;
      border: 1px solid transparent;
      transition: all 0.2s;
      white-space: nowrap;
      text-decoration: none;
    }

    .btn-copy {
      background: rgba(255,255,255,0.07);
      border-color: var(--border);
      color: var(--muted);
    }
    .btn-copy:hover {
      background: rgba(255,255,255,0.12);
      color: var(--text);
      border-color: rgba(255,255,255,0.15);
    }
    .btn-copy.copied {
      background: rgba(111,207,151,0.15);
      border-color: rgba(111,207,151,0.3);
      color: var(--success);
    }

    .btn-open {
      background: rgba(200,169,110,0.12);
      border-color: rgba(200,169,110,0.25);
      color: var(--accent);
    }
    .btn-open:hover {
      background: rgba(200,169,110,0.22);
      border-color: rgba(200,169,110,0.45);
    }

    .btn svg {
      width: 14px; height: 14px;
      stroke-width: 2;
    }

    .footer {
      text-align: center;
      margin-top: 2.4rem;
      color: var(--muted);
      font-size: 0.78rem;
      letter-spacing: 0.05em;
    }

    @media (max-width: 540px) {
      .card { flex-wrap: wrap; gap: 1rem; }
      .actions { width: 100%; justify-content: flex-end; }
    }
  </style>
</head>
<body>

<div class="container">
  <div class="header">
    <div class="header-label">Área de trabalho</div>
    <h1>Meu Painel de <span>Links</span></h1>
    <p>Acesso rápido às ferramentas do dia a dia</p>
    <div class="divider"></div>
  </div>

  <div class="grid" id="links-grid"></div>

  <div class="footer">✦ Clique em Copiar para copiar o link · Abrir para acessar</div>
</div>

<script>
  const links = [
    {
      title: "Mestre Convênio",
      url: "https://cassiakelly995-lab.github.io/Mestreconvenio/",
      icon: "📋"
    },
    {
      title: "Prompts Site OAB",
      url: "https://cassiakelly995-lab.github.io/promptsiteoab/",
      icon: "✍️"
    },
    {
      title: "Resposta E-mail",
      url: "https://cassiakelly995-lab.github.io/respostaemail/",
      icon: "✉️"
    },
    {
      title: "Convênio",
      url: "https://cassiakelly995-lab.github.io/CONVENIO/",
      icon: "🤝"
    }
  ];

  const grid = document.getElementById('links-grid');

  links.forEach((link, i) => {
    const card = document.createElement('div');
    card.className = 'card';

    card.innerHTML = `
      <div class="icon-box">${link.icon}</div>
      <div class="card-info">
        <div class="card-title">${link.title}</div>
        <div class="card-url">${link.url}</div>
      </div>
      <div class="actions">
        <button class="btn btn-copy" onclick="copyLink(this, '${link.url}')">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor"><rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/></svg>
          Copiar
        </button>
        <a class="btn btn-open" href="${link.url}" target="_blank" rel="noopener">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor"><path d="M18 13v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h6"/><polyline points="15 3 21 3 21 9"/><line x1="10" y1="14" x2="21" y2="3"/></svg>
          Abrir
        </a>
      </div>
    `;

    grid.appendChild(card);
  });

  function copyLink(btn, url) {
    navigator.clipboard.writeText(url).then(() => {
      btn.classList.add('copied');
      btn.innerHTML = `
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" style="width:14px;height:14px;stroke-width:2"><polyline points="20 6 9 17 4 12"/></svg>
        Copiado!
      `;
      setTimeout(() => {
        btn.classList.remove('copied');
        btn.innerHTML = `
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" style="width:14px;height:14px;stroke-width:2"><rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/></svg>
          Copiar
        `;
      }, 2000);
    });
  }
</script>

</body>
</html>
